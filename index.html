<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRUSTSKEP GLOBAL | Elite Institutional Tech Solutions & Talent</title>
    <meta name="description" content="Trustskep Global - Your Trusted Tech Source. High-performance software engineering, AI data operations, and technical talent pipelines for the global enterprise.">
    <meta name="theme-color" content="#001A3D">
    <meta name="author" content="Trustskep Global Solutions">
    
    <!-- SPA Redirect Logic for GitHub Pages -->
    <script type="text/javascript">
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) { 
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>

    <!-- Open Graph / Social Media -->
    <meta property="og:title" content="TRUSTSKEP GLOBAL | Tech Excellence">
    <meta property="og:description" content="Institutional grade tech solutions and elite talent pipelines.">
    <meta property="og:type" content="website">
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cpath d='M50 5L15 20V45C15 67.2 30 87.8 50 95C70 87.8 85 67.2 85 45V20L50 5Z' fill='%23002B5B' /%3E%3Cpath d='M35 45L45 55L70 30' stroke='white' stroke-width='8' stroke-linecap='round' stroke-linejoin='round' /%3E%3C/svg%3E">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              trustskep: {
                dark: '#001A3D',
                base: '#002B5B',
                light: '#0059FF',
                accent: '#00D1FF'
              }
            },
            boxShadow: {
              '4xl': '0 50px 100px -20px rgba(0, 43, 91, 0.25)',
              '5xl': '0 60px 120px -30px rgba(0, 0, 0, 0.3)',
              'glow-blue': '0 0 20px rgba(0, 89, 255, 0.4)',
            },
            fontFamily: {
              sans: ['"Plus Jakarta Sans"', 'Inter', 'sans-serif'],
            },
            animation: {
              'pulse-slow': 'pulse 15s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'shimmer': 'shimmer 12s infinite linear',
              'float': 'float 6s ease-in-out infinite',
              'fade-in-up': 'fadeInUp 0.8s ease-out forwards',
              'bounce-slow': 'bounce 3s infinite',
              'mesh': 'mesh 25s ease infinite',
            },
            keyframes: {
                mesh: {
                    '0%, 100%': { backgroundPosition: '0% 50%' },
                    '50%': { backgroundPosition: '100% 50%' },
                }
            }
          }
        }
      }
    </script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * { cursor: default; }
        a, button, input, select, textarea, label { cursor: pointer; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            transition: background-color 0.5s ease, color 0.5s ease;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            background-color: #f8fafc;
        }

        .dark body {
            background-color: #010816;
        }

        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { 
            background: #002B5B; 
            border-radius: 20px; 
            border: 4px solid transparent;
            background-clip: content-box;
        }
        .dark ::-webkit-scrollbar-thumb { background: #0059FF; border: 4px solid transparent; background-clip: content-box; }
        ::-webkit-scrollbar-thumb:hover { background: #00D1FF; border: 4px solid transparent; background-clip: content-box; }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .shimmer-text {
            background: linear-gradient(90deg, #0059FF, #00D1FF, #ffffff, #00D1FF, #0059FF);
            background-size: 200% auto;
            color: transparent;
            -webkit-background-clip: text;
            background-clip: text;
            animation: shimmer 12s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }

        .glass {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-bottom: 1px solid rgba(0, 43, 91, 0.08);
        }

        .dark .glass {
            background: rgba(1, 8, 22, 0.9);
            border-bottom: 1px solid rgba(0, 89, 255, 0.1);
        }

        .noise {
          position: fixed;
          top: 0; left: 0; width: 100%; height: 100%;
          pointer-events: none;
          opacity: 0.02;
          z-index: 9999;
          background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        .btn-spring {
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .btn-spring:active {
            transform: scale(0.92);
        }

        .particle-bg {
            background-image: radial-gradient(circle at 2px 2px, rgba(255,255,255,0.03) 1px, transparent 0);
            background-size: 60px 60px;
        }

        .btn-glow::before {
            content: '';
            position: absolute;
            inset: -2px;
            background: linear-gradient(45deg, #0059FF, #00D1FF, #0059FF);
            z-index: -1;
            border-radius: inherit;
            opacity: 0;
            transition: opacity 0.3s ease;
            filter: blur(10px);
        }
        .btn-glow:hover::before {
            opacity: 0.6;
        }
    </style>
<script type="importmap">
